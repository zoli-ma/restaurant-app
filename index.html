<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Супер</title>
<link rel="manifest" href="manifest.json">

<style>
:root{
    --bg:#0f0f0f;
    --card-bg:#1a1a1a;
    --primary:#9d4edd;
    --secondary:#00b4d8;
    --success:#2d6a4f;
    --danger:#9b2226;
    --text:#e0e0e0;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:10px;
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI,Roboto,sans-serif;
}

/* MAIN SCREEN */

#main-screen{
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header-stats{
    background:linear-gradient(145deg,#222,#111);
    padding:15px;
    border-radius:15px;
    border:1px solid #333;
    margin-bottom:12px;
}

.stat-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:5px;
}

.stat-label{
    color:#888;
}

#guests-wrapper{
    flex:1;
    overflow-y:auto;
    padding-bottom:230px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:12px;
}

.tile{
    background:var(--card-bg);
    padding:18px;
    border-radius:14px;
    text-align:center;
    border:1px solid #2a2a2a;
    cursor:pointer;
}

.guest-active{
    border-left:5px solid var(--secondary);
}

.guest-price{
    display:block;
    margin-top:10px;
    color:var(--secondary);
    font-weight:bold;
    font-size:1.2em;
}

.bottom-panel{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    background:#111;
    padding:10px;
    border-top:1px solid #333;
    z-index:100;
}

.nav-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    color:white;
    font-weight:700;
    margin-bottom:8px;
    cursor:pointer;
    font-size:16px;
}

.bottom-panel .nav-btn:last-child{
    margin-bottom:0;
}

/* MODALS */

.modal-screen{
    display:none;
    position:fixed;
    inset:0;
    background:var(--bg);
    z-index:999;
    flex-direction:column;
    padding:15px;
    overflow-y:auto;
}

.receipt-panel{
    background:#111;
    border-top:3px solid var(--primary);
    margin-top:15px;
}

.receipt-scroll{
    max-height:40vh;
    overflow-y:auto;
    padding:10px;
}

.receipt-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #222;
}

input,select{
    width:100%;
    padding:12px;
    margin:8px 0;
    background:#222;
    border:1px solid #444;
    color:white;
    border-radius:8px;
}

.history-card{
    background:#1a1a1a;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
    border-left:5px solid var(--primary);
}
</style>
</head>

<body>

<!-- MAIN -->

<div id="main-screen">

<div class="header-stats">
<div class="stat-row">
<span class="stat-label">Общий доход:</span>
<span id="all-time-earnings">0</span>
</div>

<div class="stat-row">
<span class="stat-label">За смену:</span>
<span id="shift-earnings" style="color:var(--success)">0</span>
</div>

<div style="text-align:right;margin-top:10px">
<span onclick="showHistory()" style="cursor:pointer;color:var(--primary);text-decoration:underline">📜 История смен</span>
</div>
</div>

<div id="guests-wrapper">
<div id="guests-grid" class="grid"></div>
</div>

<div class="bottom-panel">
<button class="nav-btn" style="background:var(--primary)" onclick="showAddGuest()">+ НОВЫЙ СТОЛ</button>
<button class="nav-btn" style="background:#333" onclick="showMenuEditor()">⚙️ МЕНЮ</button>
<button class="nav-btn" style="background:var(--danger)" onclick="endShift()">🏁 ЗАВЕРШИТЬ СМЕНУ</button>
</div>

</div>

<!-- ORDER -->

<div id="order-screen" class="modal-screen">

<h2 id="current-guest-label"></h2>

<div id="dept-selection" class="grid">
<div class="tile" onclick="showCategories('Кухня')">🥘 КУХНЯ</div>
<div class="tile" onclick="showCategories('Бар')">🍺 БАР</div>
</div>

<div id="category-selection" class="grid" style="display:none"></div>
<div id="item-selection" class="grid" style="display:none"></div>

<div class="receipt-panel">
<div class="receipt-scroll" id="receipt-list"></div>

<div style="padding:12px;display:flex;justify-content:space-between">
<span>СУММА:</span>
<span id="guest-total-price" style="color:var(--secondary)">0</span>
</div>

<button class="nav-btn" style="background:#444;margin:10px" onclick="closeOrderScreen()">СОХРАНИТЬ</button>
</div>

</div>

<!-- HISTORY -->

<div id="history-screen" class="modal-screen">
<div id="history-list"></div>
</div>

<!-- MENU -->

<div id="menu-editor" class="modal-screen">

<button class="nav-btn" style="background:#444" onclick="hideMenu()">← НАЗАД</button>

<h3>Добавить блюдо</h3>

<select id="new-item-dept" onchange="updateCategorySelect()">
<option value="Кухня">Кухня</option>
<option value="Бар">Бар</option>
</select>

<div style="display:flex;gap:5px">
<select id="new-item-cat-select"></select>
<button onclick="addNewCategory()" style="width:60px;background:var(--secondary);border:none;border-radius:8px;color:white">+</button>
</div>

<input id="new-item-name" placeholder="Название">
<input id="new-item-price" type="number" placeholder="Цена">

<button class="nav-btn" style="background:var(--success)" onclick="saveNewItem()">ДОБАВИТЬ</button>

<div id="menu-list-container"></div>

</div>

<script>
let activeGuestId = null;

let appData = {
menu:[],
categories:{Кухня:[],Бар:[]},
history:[],
guests:[],
allTimeEarnings:0,
percent:10
};

function save(){
localStorage.setItem("waiterData_v8",JSON.stringify(appData));
}

function init(){
const saved = localStorage.getItem("waiterData_v8");
if(saved) appData = JSON.parse(saved);
renderGuests();
updateStats();
}

function updateStats(){

let total = 0;
appData.guests.forEach(g=>total+=g.total);

let earn = total * appData.percent / 100;

appData.allTimeEarnings =
appData.history.reduce(
(sum,h)=>sum+h.earnings,
0
);

document.getElementById("all-time-earnings").innerText =
appData.allTimeEarnings.toFixed(2);

document.getElementById("shift-earnings").innerText =
earn.toFixed(2);

save();

}
function renderGuests(){
const box = document.getElementById("guests-grid");
box.innerHTML = "";

appData.guests.forEach(g=>{

let color = "#555";

if(g.total >= 1000) color = "#0077b6";
if(g.total >= 5000) color = "#2d6a4f";
if(g.total >= 10000) color = "#d4af37";

box.innerHTML += `
<div class="tile guest-active"
style="
position:relative;
border-left:5px solid ${color}">

<div onclick="openOrder(${g.id})">
<b>Стол ${g.name}</b>

<span class="guest-price" style="color:${color}">
${g.total}
</span>
</div>

<button
onclick="event.stopPropagation();deleteGuest(${g.id})"
style="
position:absolute;
top:8px;
right:8px;
background:transparent;
border:none;
color:#666;
font-size:14px;
cursor:pointer;
opacity:.5;">
🗑
</button>

</div>
`;
});

}

function showAddGuest(){
let name = prompt("№ Стола");
if(!name) return;

appData.guests.push({
id:Date.now(),
name:name,
items:[],
total:0
});

save();
renderGuests();
updateStats();
}

function openOrder(id){
activeGuestId=id;
document.getElementById("order-screen").style.display="flex";

const g = appData.guests.find(x=>x.id===id);
document.getElementById("current-guest-label").innerText="Стол "+g.name;

resetOrderNav();
renderReceipt();
}

function closeOrderScreen(){
document.getElementById("order-screen").style.display="none";
renderGuests();
}

function resetOrderNav(){
document.getElementById("dept-selection").style.display="grid";
document.getElementById("category-selection").style.display="none";
document.getElementById("item-selection").style.display="none";
}

function showCategories(dept){
document.getElementById("dept-selection").style.display="none";

const box = document.getElementById("category-selection");
box.style.display="grid";

box.innerHTML=`<button class="nav-btn" style="background:#333;grid-column:1/-1" onclick="resetOrderNav()">← НАЗАД</button>`;

appData.categories[dept].forEach(cat=>{
box.innerHTML += `<div class="tile" onclick="showItems('${dept}','${cat}')">${cat}</div>`;
});
}

function showItems(dept,cat){
document.getElementById("category-selection").style.display="none";

const box = document.getElementById("item-selection");
box.style.display="grid";

box.innerHTML=`<button class="nav-btn" style="background:#333;grid-column:1/-1" onclick="showCategories('${dept}')">← НАЗАД</button>`;

appData.menu
.filter(i=>i.dept===dept && i.cat===cat)
.forEach(i=>{
box.innerHTML += `<div class="tile" onclick="addItemToOrder(${i.id})">${i.name}<br>${i.price}</div>`;
});
}

function addItemToOrder(id){
const item = appData.menu.find(i=>i.id===id);
const guest = appData.guests.find(g=>g.id===activeGuestId);

guest.items.push({...item,orderId:Date.now()});
guest.total += Number(item.price);

save();
renderReceipt();
updateStats();
}

function renderReceipt(){
const guest = appData.guests.find(g=>g.id===activeGuestId);
const box = document.getElementById("receipt-list");

box.innerHTML="";

guest.items.forEach(i=>{
box.innerHTML += `
<div class="receipt-item">
<span>${i.name}</span>
<span>${i.price}
<button onclick="removeItem(${i.orderId})" style="background:none;border:none;color:red">✕</button>
</span>
</div>`;
});

document.getElementById("guest-total-price").innerText = guest.total;
}

function removeItem(id){
const guest = appData.guests.find(g=>g.id===activeGuestId);
const index = guest.items.findIndex(i=>i.orderId===id);

guest.total -= guest.items[index].price;
guest.items.splice(index,1);

save();
renderReceipt();
updateStats();
}

function showHistory(){
const box = document.getElementById("history-list");

box.innerHTML = `
<button class="nav-btn" style="background:#444" onclick="hideHistory()">← НАЗАД</button>
<h2>История смен</h2>
`;

if(appData.history.length === 0){
box.innerHTML += "<p>История пуста</p>";
}

appData.history.forEach((h,index)=>{

box.innerHTML += `
<div class="history-card">

<div style="display:flex;justify-content:space-between">

<b>${h.date}</b>

<button
onclick="deleteHistory(${index})"
style="
background:red;
border:none;
color:white;
padding:6px 10px;
border-radius:8px;
cursor:pointer">
✕
</button>

</div>

<div style="margin:8px 0">
Доход:
<span style="color:var(--success)">
${h.earnings.toFixed(2)}
</span>
</div>

<details style="margin-top:10px;background:#222;padding:10px;border-radius:8px;">
<summary style="cursor:pointer;color:var(--secondary)">
Посмотреть детали
</summary>

<div style="margin-top:10px">

${h.guests.map(g=>`
<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #333">
<span>Стол ${g.name}</span>
<span style="color:var(--secondary)">
${g.total}
</span>
</div>
`).join("")}

</div>

</details>

</div>
`;

});

document.getElementById("main-screen").style.display = "none";
document.getElementById("history-screen").style.display = "flex";

}

function endShift(){
let total=0;
appData.guests.forEach(g=>total+=g.total);

let earn = total * appData.percent /100;

if(!confirm("Завершить смену? Доход "+earn.toFixed(2))) return;

appData.history.unshift({
date:new Date().toLocaleString(),
earnings:earn,
guests:JSON.parse(JSON.stringify(appData.guests))
});

appData.allTimeEarnings += earn;
appData.guests=[];

save();
renderGuests();
updateStats();
}

function showMenuEditor(){
document.getElementById("menu-editor").style.display="flex";
updateCategorySelect();
renderMenuList();
}

function hideMenu(){
document.getElementById("menu-editor").style.display="none";
}

function updateCategorySelect(){
const dept = document.getElementById("new-item-dept").value;
const box = document.getElementById("new-item-cat-select");

box.innerHTML="";

appData.categories[dept].forEach(c=>{
box.innerHTML += `<option value="${c}">${c}</option>`;
});
}

function addNewCategory(){
const dept = document.getElementById("new-item-dept").value;
const name = prompt("Название категории");

if(!name) return;

appData.categories[dept].push(name);
save();
updateCategorySelect();
}

function saveNewItem(){
const name = document.getElementById("new-item-name").value;
const price = Number(document.getElementById("new-item-price").value);
const dept = document.getElementById("new-item-dept").value;
const cat = document.getElementById("new-item-cat-select").value;

if(!name || !price || !cat) return;

appData.menu.push({
id:Date.now(),
name:name,
price:price,
dept:dept,
cat:cat
});

save();
renderMenuList();
}

function renderMenuList(){
    const box = document.getElementById("menu-list-container");
    box.innerHTML = "";

    // Категории
    box.innerHTML += "<h3>Категории</h3>";

    ["Кухня","Бар"].forEach(dept=>{
        box.innerHTML += `<h4>${dept}</h4>`;

        appData.categories[dept].forEach(cat=>{
            box.innerHTML += `
            <div style="display:flex;justify-content:space-between;align-items:center;background:#222;padding:10px;margin-bottom:5px;border-radius:8px">
                <span>${cat}</span>
                <button onclick="deleteCategory('${dept}','${cat}')" style="background:none;border:none;color:red;font-size:18px;cursor:pointer">✕</button>
            </div>`;
        });
    });

    box.innerHTML += "<h3>Блюда</h3>";

    appData.menu.forEach(i=>{
        box.innerHTML += `
        <div style="display:flex;justify-content:space-between;padding:10px;background:#222;margin-bottom:5px;border-radius:8px">
            <span>${i.name} (${i.cat})</span>
            <button onclick="deleteMenuItem(${i.id})" style="background:none;border:none;color:red">✕</button>
        </div>`;
    });
}

function deleteCategory(dept, cat){

    if(!confirm(`Удалить категорию "${cat}"?`)) return;

    // Удаляем категорию
    appData.categories[dept] =
        appData.categories[dept].filter(c => c !== cat);

    // Удаляем все блюда этой категории
    appData.menu =
        appData.menu.filter(i => !(i.dept === dept && i.cat === cat));

    save();
    updateCategorySelect();
    renderMenuList();
}

function deleteMenuItem(id){
appData.menu = appData.menu.filter(i=>i.id!==id);
save();
renderMenuList();
}

init();

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

function hideHistory(){
    document.getElementById("history-screen").style.display = "none";
    document.getElementById("main-screen").style.display = "flex";
}

function deleteGuest(id){

if(!confirm("Удалить стол?")) return;

appData.guests =
appData.guests.filter(g=>g.id!==id);

save();
renderGuests();
updateStats();

document.getElementById("order-screen").style.display="none";
}

function deleteHistory(index){

if(!confirm("Удалить эту смену?")) return;

const deleted = appData.history[index];

appData.allTimeEarnings -= deleted.earnings;

if(appData.allTimeEarnings < 0){
appData.allTimeEarnings = 0;
}

appData.history.splice(index,1);

save();

updateStats();

showHistory();

}
